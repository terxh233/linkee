    <script>
        async function findMatchingServices(jobId) {
            const btn = document.querySelector(`[data-match-btn="${jobId}"]`);
            const resultDiv = document.querySelector(`[data-match-result="${jobId}"]`);

            btn.disabled = true;
            btn.textContent = '⏳ Matching...';

            try {
                // Get job info from the DOM
                const jobItem = btn.closest('.job-item');
                const title = jobItem.querySelector('h4').textContent;
                const metaText = jobItem.querySelector('p').textContent;
                const category = metaText.split('•')[0].trim();

                const res = await fetch('/api/ai/match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jobTitle: title,
                        jobCategory: category,
                        jobDescription: title
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `
                        <strong>✨ ${data.summary || 'AI Recommendations'}</strong>
                        ${data.matchedCategories ? '<br><strong>Best categories:</strong> ' + data.matchedCategories.join(', ') : ''}
                        ${data.tips ? '<br><strong>Tips:</strong><ul>' + data.tips.map(t => '<li>' + t + '</li>').join('') + '</ul>' : ''}
                    `;
                } else {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = '⚠️ ' + (data.error || 'Could not find matches.');
                }
            } catch (err) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '⚠️ Could not reach AI service.';
            } finally {
                btn.disabled = false;
                btn.textContent = '✨ Find Services';
            }
        }
    </script>
